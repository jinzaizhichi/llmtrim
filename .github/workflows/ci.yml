name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # aws-lc-rs (pulled in by the interceptor's rustls stack) assembles with NASM on Windows.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release
      - name: Compile live feature
        run: cargo build --features live
      # Guard the tokio-free library path Cargo.toml advertises for embedders
      # (`default-features = false` drops the interceptor + tokio).
      - name: Compile embedder core (no default features)
        run: cargo check --no-default-features --lib

  # Gate the AGPL-3.0-only relicensing: fail if any dependency carries a license
  # outside deny.toml's allow-list (e.g. GPL/proprietary) or an unknown source.
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources
