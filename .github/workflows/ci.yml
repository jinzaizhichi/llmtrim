name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # aws-lc-rs (pulled in by the interceptor's rustls stack) assembles with NASM on Windows.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release
      - name: Compile live feature
        run: cargo build --features live
      # Guard the tokio-free library path Cargo.toml advertises for embedders
      # (`default-features = false` drops the interceptor + tokio).
      - name: Compile embedder core (no default features)
        run: cargo check --no-default-features --lib
      # Refresh the README test-count badge (shields endpoint reads .github/badges/tests.json).
      # Ubuntu + main only; commits only when the count changes — `[skip ci]` stops a re-trigger
      # loop, the diff-guard stops empty commits.
      - name: Update test-count badge
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        run: |
          count=$(cargo test 2>&1 | grep -oE '[0-9]+ passed' | awk '{s+=$1} END{print s}')
          printf '{"schemaVersion":1,"label":"tests","message":"%s passing","color":"2ea043"}\n' "$count" > .github/badges/tests.json
          if ! git diff --quiet -- .github/badges/tests.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/tests.json
            git commit -m "ci: test-count badge -> ${count} passing [skip ci]"
            git push
          fi

  # Gate the AGPL-3.0-only relicensing: fail if any dependency carries a license
  # outside deny.toml's allow-list (e.g. GPL/proprietary) or an unknown source.
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources
