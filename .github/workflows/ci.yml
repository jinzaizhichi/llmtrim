name: CI

on:
  # No workflow-level paths-ignore: a workflow skipped that way leaves required status
  # contexts stuck "Pending", which permanently blocks docs-only PRs (branch protection on
  # main requires the job contexts below). Instead the workflow always runs and the heavy
  # jobs are gated per-job on the `changes` filter — a job skipped via its `if:` reports
  # "Success" and satisfies the required check, while still running for real on any code
  # change. A workflow skipped by paths-ignore, by contrast, leaves the context pending
  # forever.
  push:
    branches: [main, master]
  pull_request:

# Rapid pushes stack runs that all execute to completion — cancel the superseded one.
# Tag/release runs are unaffected (separate workflow, no shared group).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job only reads the repo; none of them write anything back.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Detect whether anything other than docs/assets changed. On a docs-only change the
  # single-name jobs below skip outright (a skipped required check reports "Success" and
  # satisfies branch protection), while the `test` matrix job runs but no-ops per-step (a
  # *skipped* matrix job never expands its per-OS contexts, which branch protection requires
  # by name — see that job). The gate is fail-safe: jobs run unless `code` is explicitly
  # "false", so if the `changes` job itself fails or is skipped (empty output) the real work
  # still runs rather than letting code through untested.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    # paths-filter reads the PR file list via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `code` is true when the push/PR touches anything that is NOT a doc/asset.
          # `every` makes a file count toward `code` only when it matches ALL patterns (the
          # `**` catch-all and every `!` exclusion) — the documented idiom for "any non-doc
          # file". The filter is still true if at least one changed file qualifies, so a
          # mixed code+docs PR is correctly treated as code.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.svg'
              - '!LICENSE'
              - '!.gitignore'
              - '!.gitattributes'

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    # Unlike the single-name jobs below, a *matrix* job that is skipped at the job level
    # never expands, so its per-OS contexts (`Test (ubuntu-latest)` …) — which branch
    # protection requires by name — are never reported and a docs-only PR stays blocked
    # forever. So this job always runs (matrix expands → contexts report) and instead skips
    # its work per-step on docs-only changes, completing as a fast success. `!cancelled()`
    # keeps it running even if the `changes` job failed (fail-safe — never skip real tests).
    if: ${{ !cancelled() }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # `RUN` is false only on a docs-only change; every step gates on it so the job no-ops
    # (and reports success under each required context name) without doing real work.
    env:
      RUN: ${{ needs.changes.outputs.code != 'false' }}
    steps:
      - if: ${{ env.RUN != 'false' }}
        uses: actions/checkout@v6
      - if: ${{ env.RUN != 'false' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - if: ${{ env.RUN != 'false' }}
        uses: Swatinem/rust-cache@v2
      # aws-lc-rs (pulled in by the interceptor's rustls stack) assembles with NASM on Windows.
      - name: Install NASM (Windows)
        if: ${{ env.RUN != 'false' && runner.os == 'Windows' }}
        uses: ilammy/setup-nasm@v1
      - name: Format
        if: ${{ env.RUN != 'false' }}
        run: cargo fmt --all -- --check
      - name: Clippy
        if: ${{ env.RUN != 'false' }}
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        if: ${{ env.RUN != 'false' }}
        run: cargo test
      - name: Build (release)
        if: ${{ env.RUN != 'false' }}
        run: cargo build --release
      - name: Compile live feature
        if: ${{ env.RUN != 'false' }}
        run: cargo build -p llmtrim --features live
      # Guard the embeddable engine: llmtrim-core must build standalone, and the CLI lib
      # must still compile with the interceptor (+ tokio) dropped. `--features`/`--lib` are
      # package-scoped — they can't run at the virtual workspace root.
      - name: Compile embedder core (llmtrim-core)
        if: ${{ env.RUN != 'false' }}
        run: cargo check -p llmtrim-core
      # The optional features (skeleton/tiktoken/multimodal) must each drop cleanly: the
      # no-default build is the one the wasm binding ships, so guard it (and run its tests).
      - name: Compile + test core with all optional features off
        if: ${{ env.RUN != 'false' }}
        run: cargo test -p llmtrim-core --no-default-features
      - name: Compile CLI lib without the interceptor
        if: ${{ env.RUN != 'false' }}
        run: cargo check -p llmtrim --no-default-features --lib

  # Exercise the UniFFI bindings end-to-end, not just the Rust-side tests in the `test`
  # job: generating all four languages catches a binding-definition break (incl. Swift +
  # Kotlin, whose toolchains we don't install), and the Python wheel + Ruby suites prove
  # the FFI surface actually loads and compresses from each host language.
  bindings:
    name: UniFFI bindings
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: pip install maturin pytest wheel
      - run: gem install ffi --no-document
      # Smoke: all four languages must generate from the one Rust definition (this is the
      # only coverage Swift/Kotlin get — it fails if the binding API stops being FFI-shaped).
      - name: Generate bindings (python/ruby/swift/kotlin)
        run: crates/llmtrim-uniffi/scripts/generate-bindings.sh "$RUNNER_TEMP/bindings"
      - name: Python — build wheel, install, pytest
        run: |
          crates/llmtrim-uniffi/scripts/build-wheel.sh
          pip install target/wheels/llmtrim-*.whl
          pytest crates/llmtrim-uniffi/tests/python -q
      - name: Ruby — minitest against the generated glue
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
        run: ruby -I"$RUNNER_TEMP/bindings/ruby" crates/llmtrim-uniffi/tests/ruby/test_llmtrim.rb

  # WASM: the host build + unit tests of llmtrim-wasm are already covered by the `test` job
  # (it's a workspace member). This job adds the wasm32 target build and the JS boundary —
  # generate the Node bindings and run the smoke test, which catches an FFI/typing break.
  wasm:
    name: WASM binding (smoke)
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # wasm-bindgen-cli must match the wasm-bindgen crate version in Cargo.lock exactly
      # (the binary checks a schema version), so derive it instead of pinning a literal.
      - name: Resolve wasm-bindgen version
        id: wb
        run: echo "ver=$(cargo metadata --format-version=1 | jq -r '.packages[]|select(.name=="wasm-bindgen")|.version' | head -1)" >> "$GITHUB_OUTPUT"
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wb.outputs.ver }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build for wasm32 + generate Node bindings
        env:
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        run: |
          cargo build -p llmtrim-wasm --release --target wasm32-unknown-unknown
          wasm-bindgen target/wasm32-unknown-unknown/release/llmtrim_wasm.wasm \
            --out-dir crates/llmtrim-wasm/pkg --target nodejs
      - name: Node smoke test
        run: node crates/llmtrim-wasm/smoke.mjs

  # Swift: compile the generated bindings + a smoke against the cdylib on macOS and run it.
  # This is the compile-and-load verification for the Swift target (the prerequisite to a
  # SwiftPM package); full xcframework/SwiftPM packaging is a later step.
  bindings-swift:
    name: Swift binding (smoke)
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build cdylib + generate Swift
        run: |
          cargo build -p llmtrim-uniffi
          cargo run -q --bin uniffi-bindgen -p llmtrim-uniffi -- \
            generate --library target/debug/libllmtrim_ffi.dylib --language swift --out-dir gen/swift
      - name: Compile and run the Swift smoke
        run: |
          swiftc -parse-as-library \
            -L target/debug -lllmtrim_ffi \
            -Xcc -fmodule-map-file=gen/swift/llmtrim_ffiFFI.modulemap \
            -I gen/swift \
            gen/swift/llmtrim_ffi.swift crates/llmtrim-uniffi/tests/swift/smoke.swift -o swift-smoke
          DYLD_LIBRARY_PATH=target/debug ./swift-smoke

  # Kotlin: compile the generated bindings (which use JNA) + a smoke and run it on a JVM.
  # Compile-and-load verification for the Kotlin target; full Gradle/Maven packaging later.
  bindings-kotlin:
    name: Kotlin binding (smoke)
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install the Kotlin compiler
        run: |
          curl -fsSL -o kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q kotlin.zip -d "$HOME/kotlin"
          echo "$HOME/kotlin/kotlinc/bin" >> "$GITHUB_PATH"
      - name: Build cdylib + generate Kotlin + fetch JNA
        run: |
          cargo build -p llmtrim-uniffi
          cargo run -q --bin uniffi-bindgen -p llmtrim-uniffi -- \
            generate --library target/debug/libllmtrim_ffi.so --language kotlin --out-dir gen/kotlin
          curl -fsSL -o jna.jar https://repo1.maven.org/maven2/net/java/dev/jna/jna/5.14.0/jna-5.14.0.jar
      - name: Compile and run the Kotlin smoke
        run: |
          kotlinc gen/kotlin/uniffi/llmtrim_ffi/llmtrim_ffi.kt \
            crates/llmtrim-uniffi/tests/kotlin/Smoke.kt \
            -cp jna.jar -include-runtime -d smoke.jar
          java -Djna.library.path="$PWD/target/debug" -cp "smoke.jar:jna.jar" SmokeKt

  # Build the publishable Swift package: assemble the XCFramework (per-Apple-target static
  # libs + generated FFI headers) and compile the SwiftPM package against it. macOS-only
  # (XCFrameworks need Xcode). Heavier than the bindings-swift smoke — can be moved to
  # release-only if macOS minutes get tight.
  bindings-swift-package:
    name: Swift package (xcframework)
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build the XCFramework
        run: crates/llmtrim-uniffi/scripts/build-xcframework.sh
      - name: Build + test the SwiftPM package against it
        run: swift test --package-path crates/llmtrim-uniffi/packaging/swift

  # Gate llmtrim's MPL-2.0 licensing: fail if any dependency carries a license
  # outside deny.toml's allow-list (e.g. GPL/proprietary) or an unknown source.
  license-check:
    name: License compliance
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # Enforced secret scan — the local hooks are opt-in and bypassable (--no-verify);
  # this job catches everyone. fetch-depth: 0 so a secret buried in an earlier commit
  # of a PR branch still fails, not just the tip.
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Homebrew formula must stay valid Ruby (a lowercase class name once broke `brew install`).
  formula:
    name: Formula syntax
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: for f in Formula/*.rb; do ruby -c "$f"; done

  # Guard the advertised MSRV (`rust-version` in Cargo.toml). Stable-only CI can silently
  # adopt a newer-than-1.88 API; this job fails when that happens.
  msrv:
    name: MSRV (1.88)
    needs: changes
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
